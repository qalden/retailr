server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: retailr-gateway
  cloud:
    gateway:
      # CORS configuration for frontend access
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - X-User-Id
              - X-User-Email
              - X-User-Role
            allowCredentials: true
      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      # Enable route definitions in RouteLocator bean
      routes: []

# JWT Configuration
# Note: jwt.secret MUST be set via environment variable or external configuration
# Do not hardcode secrets in version-controlled files
jwt:
  expiration: 3600000  # 1 hour in milliseconds

# Resilience4j Rate Limiter Configuration
resilience4j:
  ratelimiter:
    configs:
      default:
        limitRefreshPeriod: 1m
        limitForPeriod: 1000
        timeoutDuration: 1s
        registerHealthIndicator: true
    instances:
      global:
        baseLimiters:
          limitRefreshPeriod: 1m
          limitForPeriod: 1000
          timeoutDuration: 1s

# Logging Configuration
logging:
  level:
    root: INFO
    com.retailr.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

# Elastic APM Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true
