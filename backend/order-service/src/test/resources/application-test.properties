# Test Database Configuration - H2 In-Memory
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA and Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway for tests
spring.flyway.enabled=false

# H2 Console (for debugging)
spring.h2.console.enabled=true

# Disable security for integration tests
spring.security.filter.order=10
spring.security.user.name=testuser
spring.security.user.password=testpass

# Catalog Service Configuration
catalog-service.url=http://localhost:8082/api/v1/products
catalog-service.connect-timeout=5000
catalog-service.read-timeout=10000

# Order Service Configuration
order-service.default-warehouse-id=1
